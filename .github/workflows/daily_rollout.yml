name: Daily SEO Auto-Pilot
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

# CRITICAL: This fixes the Exit Code 128 (Permission Denied)
permissions:
  contents: write

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for all branches and tags

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Requirements
        run: pip install pandas requests
        
      - name: Run Keyword Engine
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python generator.py
        
      - name: Commit and Push Progress
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add keywords.csv sites/
          # This 'git diff' check prevents failure if no files changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Rollout: 10 New Sites" && git push)
