name: Daily Printify SEO Rollout
on:
  schedule:
    - cron: '0 0 * * *' # Runs at Midnight UTC every day
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Generator Script
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }} # Store your Bing key in GitHub Secrets
        run: python generator.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output # The folder where your script saves the HTML
