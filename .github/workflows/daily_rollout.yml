name: Daily SEO Auto-Pilot
on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Requirements
        run: pip install pandas requests
        
      - name: Run Keyword Engine
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python generator.py
        
      - name: Commit Progress
        run: |
          git config --global user.name 'SEO-Bot'
          git config --global user.email 'bot@brightlane.dev'
          git add keywords.csv sites/
          git commit -m "Automated Rollout: 10 New Sites"
          git push
