name: Daily Blog Generator

on:
  schedule:
    - cron: '0 9 * * *'  # This will trigger the workflow every day at 9:00 AM UTC
  workflow_dispatch:  # This allows the workflow to be manually triggered

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install openai schedule  # Install necessary dependencies

    - name: Run Daily Blog Generator
      run: |
        python path/to/your/script/daily_blog_generator.py  # Replace with the path to your Python script
