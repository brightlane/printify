name: Daily Blog Generator

on:
  schedule:
    - cron: '0 9 * * *'  # This triggers the workflow every day at 9 AM (UTC)
  workflow_dispatch:  # Allows manual trigger from the GitHub UI

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Set up Python environment
      - name: Set up Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      # Install dependencies (such as OpenAI package)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai schedule

      # Run the Daily Blog Generator Python script
      - name: Run Daily Blog Generator
        run: |
          python daily_blog_generator.py  # Update the path as needed

      # Optionally, you can add a step to push the generated blog to your CMS here (e.g., WordPress, Ghost, etc.)
